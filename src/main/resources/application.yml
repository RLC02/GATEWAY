server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      mvc:
        routes:
        - id: login-api
          uri: http://localhost:8081
          predicates:
            - Path=/login/**
        - id: cliente-api
          uri: http://localhost:8082
          predicates:
            - Path=/clientes/**
        - id: produto-api
          uri: http://localhost:8083
          predicates:
            - Path=/produtos/**
        - id: compra-api
          uri: http://localhost:8083
          predicates:
            - Path=/compras/**
